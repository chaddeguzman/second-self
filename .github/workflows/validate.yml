name: Validate and open pull request

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.lock
      - run: python -m pip install --no-deps -e .
      - run: python -m pytest
      - run: python -m second_self validate --privacy
  open-pull-request:
    if: github.ref_name == 'automation/main'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = "automation/main";
            const base = "main";
            const comparison = await github.rest.repos.compareCommits({
              owner,
              repo,
              base,
              head,
            });
            if (comparison.data.ahead_by === 0) {
              core.notice(`${head} is already aligned with ${base}; no pull request is needed.`);
              return;
            }
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${head}`,
              base,
              state: "open",
            });

            if (existing.data.length > 0) {
              core.notice(`Pull request #${existing.data[0].number} already tracks ${head}.`);
              return;
            }

            const message = context.payload.head_commit?.message ?? "Automated update";
            const title = message.split("\n", 1)[0];
            const created = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title,
              body: [
                "This pull request was opened automatically after a local commit to `main`.",
                "",
                "The protected branch will remain unchanged until its required checks pass and the pull request is merged.",
              ].join("\n"),
            });
            core.notice(`Opened pull request #${created.data.number}.`);
