name: Validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.lock
      - run: python -m pip install --no-deps -e .
      - run: python -m pytest
      - run: python -m second_self validate --privacy
